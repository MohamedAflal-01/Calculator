<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="j14.css">
    <link rel="shortcut icon" href="IMG_5066.JPG.jpeg" type="image/x-icon">
    
</head>
<body>
    
    <div class="cal">
    <div class="head">
        <h1>Calculator</h1>
    </div>
    
    <div class="in">
        <input type="text" id="display" value="0" readonly>
    </div>
    <br>
    
    <div class="calculator">
    <div class="c">
        <button onclick="clearDisplay()">AC</button>
        <button onclick="backspace()">C</button>
        <button onclick="percentage()">%</button>
        <button onclick="appendValue('/')">/</button>
    </div>
    <br>

    <div class="num1">
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="multi" onclick="appendValue('*')">*</button><br>
    </div>
    <br>
    
    
    <div class="num2">
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="sub" onclick="appendValue('-')">-</button><br>
    </div>
    <br>

    <div class="num3">
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="add" onclick="appendValue('+')">+</button><br>
    </div>
    <br>

    <div class="num4">
        <button onclick="appendValue('00')">00</button>
        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="sum" onclick="calculate()">=</button>
    </div>
    </div>
    </div>
 <script src="j14.js"></script>
</body>
</html>
